apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: letstype-backend
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/yuktasingh16/terraform_infra
    targetRevision: main
    path: k8s/backend

  destination:
    server: https://kubernetes.default.svc
    namespace: letstype

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
