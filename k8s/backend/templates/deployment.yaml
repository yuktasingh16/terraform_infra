apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: letstype

  labels:
    app: backend

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 3000

          env:
            - name: NODE_ENV
              value: "{{ .Values.env.NODE_ENV }}"

            - name: PORT
              value: "{{ .Values.env.PORT }}"

            - name: DB_HOST
              value: "{{ .Values.env.DB_HOST }}"

            - name: DB_PORT
              value: "{{ .Values.env.DB_PORT }}"

            - name: DB_NAME
              value: "{{ .Values.env.DB_NAME }}"

            - name: DB_USER
              value: "{{ .Values.env.DB_USER }}"

            - name: DB_PASSWORD
              value: "{{ .Values.env.DB_PASSWORD }}"

            - name: JWT_SECRET
              value: "{{ .Values.env.JWT_SECRET }}"

          resources:
{{- toYaml .Values.resources | nindent 12 }}

          readinessProbe:
            httpGet:
              path: /health
              port: 3000

            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 3000

            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3