name: Platform CD

on:
  push:
    branches:
      - main
    paths:
      - "terraform/platform/**"
      - "terraform/modules/eks/**"
      - "terraform/modules/nodegroup/**"
      - ".github/workflows/terraform-platform-cd.yml"
  workflow_run:
    workflows:
      - "Foundation CD"
    types:
      - completed

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_WORKING_DIR: terraform/platform
  TF_PLAN_NAME: platform

jobs:
  apply:
    name: Deploy platform
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    environment: terraform-platform
    concurrency:
      group: terraform-platform
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Cache Terraform providers and modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            ${{ env.TF_WORKING_DIR }}/.terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('terraform/platform/**/*.tf', 'terraform/platform/**/*.tfvars', 'terraform/platform/**/*.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Configure Terraform plugin cache
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir="$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Terraform fmt check
        run: |
          terraform fmt -check -recursive terraform/platform
          terraform fmt -check -recursive terraform/modules/eks
          terraform fmt -check -recursive terraform/modules/nodegroup

      - name: Detect foundation changes
        id: foundation_changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "foundation_change=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.event.after }}"

          if [ -z "$before" ] || [[ "$before" =~ ^0+$ ]]; then
            changed=$(git diff-tree --no-commit-id --name-only -r "$after" | grep -E '^(terraform/foundation/|terraform/modules/(network|iam|ecr)/)') || true
          else
            changed=$(git diff --name-only "$before" "$after" | grep -E '^(terraform/foundation/|terraform/modules/(network|iam|ecr)/)') || true
          fi

          if [ -n "$changed" ]; then
            echo "foundation_change=true" >> "$GITHUB_OUTPUT"
          else
            echo "foundation_change=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to deploy platform
        id: deploy_gate
        shell: bash
        run: |
          if [ "${{ steps.foundation_changed.outputs.foundation_change }}" = "true" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip platform apply when foundation changed
        if: steps.deploy_gate.outputs.should_deploy == 'false'
        run: |
          echo "Foundation changes detected in this push. Skipping platform CD so Foundation CD can complete first."

      - name: Configure AWS credentials
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-platform-apply

      - name: Ensure foundation state exists
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        run: |
          aws s3api head-object --bucket letstype-terraform-state --key terraform/foundation.tfstate

      - name: Terraform init
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform validate
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate -no-color

      - name: Terraform plan
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -input=false -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Upload Terraform plan
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-${{ env.TF_PLAN_NAME }}-apply-plan
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan.txt
          retention-days: 14

      - name: Terraform apply
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -lock-timeout=5m -auto-approve tfplan
