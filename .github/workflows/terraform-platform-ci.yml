name: Terraform Platform CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/platform/**"
      - "terraform/modules/eks/**"
      - "terraform/modules/nodegroup/**"
      - ".github/workflows/terraform-platform-ci.yml"
      - ".github/workflows/terraform-deploy.yml"

permissions:
  contents: read
  id-token: write
  pull-requests: read

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.15.7
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_WORKING_DIR: terraform/platform
  TF_PLAN_NAME: platform
  TF_PLUGIN_CACHE_DIR: /home/runner/.terraform.d/plugin-cache

jobs:
  platform-ci:
    name: Validate and Plan Platform
    runs-on: ubuntu-latest

    concurrency:
      group: terraform-platform-ci-${{ github.event.pull_request.number || github.ref_name }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Verify Terraform version
        shell: bash
        run: |
          set -euo pipefail
          terraform version

      - name: Create Terraform plugin cache directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: ${{ runner.os }}-terraform-${{ env.TERRAFORM_VERSION }}-platform-${{ hashFiles('terraform/platform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TERRAFORM_VERSION }}-platform-
            ${{ runner.os }}-terraform-${{ env.TERRAFORM_VERSION }}-

      - name: Terraform format check
        shell: bash
        run: |
          set -euo pipefail

          terraform fmt -check -recursive terraform/platform
          terraform fmt -check -recursive terraform/modules/eks
          terraform fmt -check -recursive terraform/modules/nodegroup

      - name: Verify AWS role secret is configured
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          AWS_ROLE_ARN_CHECK: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_ROLE_ARN_CHECK}" ]; then
            echo "::error::AWS_ROLE_ARN GitHub Actions secret is not configured."
            exit 1
          fi

          echo "AWS_ROLE_ARN secret is configured."

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-platform-ci

      - name: Verify AWS identity
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          aws sts get-caller-identity

      - name: Verify Terraform backend access
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          aws s3api head-bucket \
            --bucket letstype-terraform-state \
            --region "${AWS_REGION}"

          aws s3api list-objects-v2 \
            --bucket letstype-terraform-state \
            --prefix terraform/ \
            --max-items 1 \
            --region "${AWS_REGION}" \
            > /dev/null

          echo "Terraform S3 backend access verified."

      - name: Verify Foundation remote state exists
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          if ! aws s3api head-object \
            --bucket letstype-terraform-state \
            --key terraform/foundation.tfstate \
            --region "${AWS_REGION}" \
            > /dev/null 2>&1
          then
            echo "::error::Foundation remote state is missing."
            echo "::error::Expected s3://letstype-terraform-state/terraform/foundation.tfstate"
            exit 1
          fi

          echo "Foundation remote state exists."

      - name: Terraform init for pull request validation
        if: github.event_name == 'pull_request'
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform init -backend=false -input=false

      - name: Terraform init for cloud plan
        if: github.event_name != 'pull_request'
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform validate -no-color

      - name: Terraform plan
        if: github.event_name != 'pull_request'
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          terraform plan \
            -input=false \
            -lock-timeout=5m \
            -no-color \
            -out=tfplan

          terraform show -no-color tfplan > plan.txt

      - name: Upload Terraform plan
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-${{ env.TF_PLAN_NAME }}-plan-${{ github.event.pull_request.number || github.run_number }}
          path: ${{ env.TF_WORKING_DIR }}/plan.txt
          retention-days: 14
          if-no-files-found: error
