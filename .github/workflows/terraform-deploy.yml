name: Terraform Deploy

on:
  push:
    branches:
      - main
    paths:
      - "terraform/foundation/**"
      - "terraform/platform/**"
      - "terraform/database/**"
      - "terraform/modules/network/**"
      - "terraform/modules/iam/**"
      - "terraform/modules/ecr/**"
      - "terraform/modules/eks/**"
      - "terraform/modules/nodegroup/**"
      - "terraform/modules/rds/**"
      - ".github/workflows/terraform-deploy.yml"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.15.4
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_PLUGIN_CACHE_DIR: /home/runner/.terraform.d/plugin-cache

concurrency:
  group: terraform-deploy-main
  cancel-in-progress: false

jobs:
  foundation:
    name: Deploy Foundation
    runs-on: ubuntu-latest

    env:
      TF_WORKING_DIR: terraform/foundation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Create Terraform plugin cache directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-foundation-${{ hashFiles('terraform/foundation/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-foundation-
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-

      - name: Terraform format check
        shell: bash
        run: |
          set -euo pipefail

          terraform fmt -check -recursive terraform/foundation
          terraform fmt -check -recursive terraform/modules/network
          terraform fmt -check -recursive terraform/modules/iam
          terraform fmt -check -recursive terraform/modules/ecr

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-foundation-deploy

      - name: Show AWS identity
        shell: bash
        run: |
          set -euo pipefail

          echo "=== AWS identity used by GitHub Actions ==="
          aws sts get-caller-identity

      - name: Verify Terraform state bucket access
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Checking S3 bucket access ==="

          if ! aws s3api head-bucket \
            --bucket letstype-terraform-state
          then
            echo "::error::GitHub Actions IAM role cannot access S3 bucket letstype-terraform-state."
            echo "::error::Check AWS_ROLE_ARN, IAM permissions, bucket policy, permissions boundary, and SCP."
            exit 1
          fi

          echo "Terraform state bucket is accessible."

      - name: Diagnose Foundation state access
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Checking Foundation state object ==="
          echo "Expected: s3://letstype-terraform-state/terraform/foundation.tfstate"

          set +e
          output=$(aws s3api head-object \
            --bucket letstype-terraform-state \
            --key terraform/foundation.tfstate \
            --region "${AWS_REGION}" \
            2>&1)
          status=$?
          set -e

          if [ "${status}" -eq 0 ]; then
            echo "Foundation state object exists and is accessible."
          else
            echo "${output}"

            if echo "${output}" | grep -Eq "403|Forbidden|AccessDenied"; then
              echo "::error::Foundation state object access is forbidden."
              echo "::error::The assumed IAM role needs access to terraform/foundation.tfstate."
              exit 1
            fi

            if echo "${output}" | grep -Eq "404|Not Found|NoSuchKey"; then
              echo "Foundation state does not exist yet."
              echo "This is acceptable for the first Foundation deployment."
              echo "Terraform apply will create the state object."
            else
              echo "::error::Unexpected error while checking Foundation state."
              exit 1
            fi
          fi

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform validate -no-color

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          terraform plan \
            -input=false \
            -lock-timeout=5m \
            -no-color \
            -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          terraform apply \
            -input=false \
            -lock-timeout=5m \
            -auto-approve \
            tfplan

      - name: Verify Foundation state after apply
        shell: bash
        run: |
          set -euo pipefail

          aws s3api head-object \
            --bucket letstype-terraform-state \
            --key terraform/foundation.tfstate \
            --region "${AWS_REGION}" \
            > /dev/null

          echo "Foundation state verified successfully."

  platform:
    name: Deploy Platform
    runs-on: ubuntu-latest

    needs:
      - foundation

    env:
      TF_WORKING_DIR: terraform/platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Create Terraform plugin cache directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-platform-${{ hashFiles('terraform/platform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-platform-
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-

      - name: Terraform format check
        shell: bash
        run: |
          set -euo pipefail

          terraform fmt -check -recursive terraform/platform
          terraform fmt -check -recursive terraform/modules/eks
          terraform fmt -check -recursive terraform/modules/nodegroup

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-platform-deploy

      - name: Show AWS identity
        shell: bash
        run: |
          set -euo pipefail

          echo "=== AWS identity used by GitHub Actions ==="
          aws sts get-caller-identity

      - name: Verify Foundation remote state exists
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Verifying Foundation dependency ==="

          if ! aws s3api head-object \
            --bucket letstype-terraform-state \
            --key terraform/foundation.tfstate \
            --region "${AWS_REGION}" \
            > /dev/null
          then
            echo "::error::Foundation remote state is missing or inaccessible."
            echo "::error::Expected s3://letstype-terraform-state/terraform/foundation.tfstate"
            exit 1
          fi

          echo "Foundation remote state exists and is accessible."

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform validate -no-color

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          terraform plan \
            -input=false \
            -lock-timeout=5m \
            -no-color \
            -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          terraform apply \
            -input=false \
            -lock-timeout=5m \
            -auto-approve \
            tfplan

      - name: Verify Platform state after apply
        shell: bash
        run: |
          set -euo pipefail

          aws s3api head-object \
            --bucket letstype-terraform-state \
            --key terraform/platform.tfstate \
            --region "${AWS_REGION}" \
            > /dev/null

          echo "Platform state verified successfully."

  database:
    name: Deploy Database
    runs-on: ubuntu-latest

    needs:
      - platform

    env:
      TF_WORKING_DIR: terraform/database
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Create Terraform plugin cache directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-database-${{ hashFiles('terraform/database/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-database-
            ${{ runner.os }}-terraform-${{ env.TF_VERSION }}-

      - name: Terraform format check
        shell: bash
        run: |
          set -euo pipefail

          terraform fmt -check -recursive terraform/database
          terraform fmt -check -recursive terraform/modules/rds

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-database-deploy

      - name: Show AWS identity
        shell: bash
        run: |
          set -euo pipefail

          echo "=== AWS identity used by GitHub Actions ==="
          aws sts get-caller-identity

      - name: Verify Foundation remote state exists
        shell: bash
        run: |
          set -euo pipefail

          if ! aws s3api head-object \
            --bucket letstype-terraform-state \
            --key terraform/foundation.tfstate \
            --region "${AWS_REGION}" \
            > /dev/null
          then
            echo "::error::Foundation remote state is missing or inaccessible."
            echo "::error::Expected s3://letstype-terraform-state/terraform/foundation.tfstate"
            exit 1
          fi

          echo "Foundation remote state exists and is accessible."

      - name: Verify Platform remote state exists
        shell: bash
        run: |
          set -euo pipefail

          if ! aws s3api head-object \
            --bucket letstype-terraform-state \
            --key terraform/platform.tfstate \
            --region "${AWS_REGION}" \
            > /dev/null
          then
            echo "::error::Platform remote state is missing or inaccessible."
            echo "::error::Expected s3://letstype-terraform-state/terraform/platform.tfstate"
            exit 1
          fi

          echo "Platform remote state exists and is accessible."

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform validate -no-color

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          terraform plan \
            -input=false \
            -lock-timeout=5m \
            -no-color \
            -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          terraform apply \
            -input=false \
            -lock-timeout=5m \
            -auto-approve \
            tfplan

      - name: Verify Database state after apply
        shell: bash
        run: |
          set -euo pipefail

          aws s3api head-object \
            --bucket letstype-terraform-state \
            --key terraform/database.tfstate \
            --region "${AWS_REGION}" \
            > /dev/null

          echo "Database state verified successfully."