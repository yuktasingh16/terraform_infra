name: Terraform Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "terraform/foundation/**"
      - "terraform/platform/**"
      - "terraform/database/**"
      - "terraform/modules/network/**"
      - "terraform/modules/iam/**"
      - "terraform/modules/ecr/**"
      - "terraform/modules/eks/**"
      - "terraform/modules/nodegroup/**"
      - "terraform/modules/rds/**"
      - ".github/workflows/terraform-deploy.yml"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.15.7
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_PLUGIN_CACHE_DIR: /home/runner/.terraform.d/plugin-cache

concurrency:
  group: terraform-deploy-main
  cancel-in-progress: false

jobs:
  foundation:
    name: Deploy Foundation
    runs-on: ubuntu-latest
    environment: terraform-foundation

    env:
      TF_WORKING_DIR: terraform/foundation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Verify Terraform version
        shell: bash
        run: |
          set -euo pipefail
          terraform version

      - name: Create Terraform plugin cache directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: ${{ runner.os }}-terraform-${{ env.TERRAFORM_VERSION }}-foundation-${{ hashFiles('terraform/foundation/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TERRAFORM_VERSION }}-foundation-
            ${{ runner.os }}-terraform-${{ env.TERRAFORM_VERSION }}-

      - name: Terraform format check
        shell: bash
        run: |
          set -euo pipefail

          terraform fmt -check -recursive terraform/foundation
          terraform fmt -check -recursive terraform/modules/network
          terraform fmt -check -recursive terraform/modules/iam
          terraform fmt -check -recursive terraform/modules/ecr

      - name: Verify AWS role secret is configured
        shell: bash
        env:
          AWS_ROLE_ARN_CHECK: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_ROLE_ARN_CHECK}" ]; then
            echo "::error::AWS_ROLE_ARN GitHub Actions secret is not configured."
            exit 1
          fi

          echo "AWS_ROLE_ARN secret is configured."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-foundation-deploy

      - name: Verify AWS identity
        shell: bash
        run: |
          set -euo pipefail
          aws sts get-caller-identity

      - name: Verify Terraform backend access
        shell: bash
        run: |
          set -euo pipefail

          aws s3api head-bucket \
            --bucket letstype-terraform-state \
            --region "${AWS_REGION}"

          aws s3api list-objects-v2 \
            --bucket letstype-terraform-state \
            --prefix terraform/ \
            --max-items 1 \
            --region "${AWS_REGION}" \
            > /dev/null

          echo "Terraform S3 backend access verified."

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform validate -no-color

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          terraform plan \
            -input=false \
            -lock-timeout=5m \
            -no-color \
            -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          terraform apply \
            -input=false \
            -lock-timeout=5m \
            -auto-approve \
            tfplan

      - name: Verify Foundation remote state after apply
        shell: bash
        run: |
          set -euo pipefail

          if ! aws s3api head-object \
            --bucket letstype-terraform-state \
            --key terraform/foundation.tfstate \
            --region "${AWS_REGION}" \
            > /dev/null 2>&1
          then
            echo "::error::Foundation apply completed but remote state was not found."
            echo "::error::Expected s3://letstype-terraform-state/terraform/foundation.tfstate"
            exit 1
          fi

          echo "Foundation remote state verified successfully."

  platform:
    name: Deploy Platform
    runs-on: ubuntu-latest
    environment: terraform-platform

    needs:
      - foundation

    env:
      TF_WORKING_DIR: terraform/platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Verify Terraform version
        shell: bash
        run: |
          set -euo pipefail
          terraform version

      - name: Create Terraform plugin cache directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: ${{ runner.os }}-terraform-${{ env.TERRAFORM_VERSION }}-platform-${{ hashFiles('terraform/platform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TERRAFORM_VERSION }}-platform-
            ${{ runner.os }}-terraform-${{ env.TERRAFORM_VERSION }}-

      - name: Terraform format check
        shell: bash
        run: |
          set -euo pipefail

          terraform fmt -check -recursive terraform/platform
          terraform fmt -check -recursive terraform/modules/eks
          terraform fmt -check -recursive terraform/modules/nodegroup

      - name: Verify AWS role secret is configured
        shell: bash
        env:
          AWS_ROLE_ARN_CHECK: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_ROLE_ARN_CHECK}" ]; then
            echo "::error::AWS_ROLE_ARN GitHub Actions secret is not configured."
            exit 1
          fi

          echo "AWS_ROLE_ARN secret is configured."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-platform-deploy

      - name: Verify AWS identity
        shell: bash
        run: |
          set -euo pipefail
          aws sts get-caller-identity

      - name: Verify Terraform backend access
        shell: bash
        run: |
          set -euo pipefail

          aws s3api head-bucket \
            --bucket letstype-terraform-state \
            --region "${AWS_REGION}"

          aws s3api list-objects-v2 \
            --bucket letstype-terraform-state \
            --prefix terraform/ \
            --max-items 1 \
            --region "${AWS_REGION}" \
            > /dev/null

          echo "Terraform S3 backend access verified."

      - name: Verify Foundation remote state exists
        shell: bash
        run: |
          set -euo pipefail

          if ! aws s3api head-object \
            --bucket letstype-terraform-state \
            --key terraform/foundation.tfstate \
            --region "${AWS_REGION}" \
            > /dev/null 2>&1
          then
            echo "::error::Foundation remote state is missing."
            echo "::error::Expected s3://letstype-terraform-state/terraform/foundation.tfstate"
            exit 1
          fi

          echo "Foundation remote state exists."

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform validate -no-color

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          terraform plan \
            -input=false \
            -lock-timeout=5m \
            -no-color \
            -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          terraform apply \
            -input=false \
            -lock-timeout=5m \
            -auto-approve \
            tfplan

  database:
    name: Deploy Database
    runs-on: ubuntu-latest
    environment: terraform-database

    needs:
      - platform

    env:
      TF_WORKING_DIR: terraform/database
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Verify Terraform version
        shell: bash
        run: |
          set -euo pipefail
          terraform version

      - name: Create Terraform plugin cache directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: ${{ runner.os }}-terraform-${{ env.TERRAFORM_VERSION }}-database-${{ hashFiles('terraform/database/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-${{ env.TERRAFORM_VERSION }}-database-
            ${{ runner.os }}-terraform-${{ env.TERRAFORM_VERSION }}-

      - name: Terraform format check
        shell: bash
        run: |
          set -euo pipefail

          terraform fmt -check -recursive terraform/database
          terraform fmt -check -recursive terraform/modules/rds

      - name: Verify DB password secret is configured
        shell: bash
        env:
          DB_PASSWORD_CHECK: ${{ secrets.DB_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${DB_PASSWORD_CHECK}" ]; then
            echo "::error::DB_PASSWORD GitHub Actions secret is not configured."
            exit 1
          fi

          echo "DB_PASSWORD secret is configured."

      - name: Verify AWS role secret is configured
        shell: bash
        env:
          AWS_ROLE_ARN_CHECK: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_ROLE_ARN_CHECK}" ]; then
            echo "::error::AWS_ROLE_ARN GitHub Actions secret is not configured."
            exit 1
          fi

          echo "AWS_ROLE_ARN secret is configured."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-database-deploy

      - name: Verify AWS identity
        shell: bash
        run: |
          set -euo pipefail
          aws sts get-caller-identity

      - name: Verify Terraform backend access
        shell: bash
        run: |
          set -euo pipefail

          aws s3api head-bucket \
            --bucket letstype-terraform-state \
            --region "${AWS_REGION}"

          aws s3api list-objects-v2 \
            --bucket letstype-terraform-state \
            --prefix terraform/ \
            --max-items 1 \
            --region "${AWS_REGION}" \
            > /dev/null

          echo "Terraform S3 backend access verified."

      - name: Verify Foundation remote state exists
        shell: bash
        run: |
          set -euo pipefail

          if ! aws s3api head-object \
            --bucket letstype-terraform-state \
            --key terraform/foundation.tfstate \
            --region "${AWS_REGION}" \
            > /dev/null 2>&1
          then
            echo "::error::Foundation remote state is missing."
            echo "::error::Expected s3://letstype-terraform-state/terraform/foundation.tfstate"
            exit 1
          fi

          echo "Foundation remote state exists."

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          terraform validate -no-color

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          terraform plan \
            -input=false \
            -lock-timeout=5m \
            -no-color \
            -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          terraform apply \
            -input=false \
            -lock-timeout=5m \
            -auto-approve \
            tfplan
