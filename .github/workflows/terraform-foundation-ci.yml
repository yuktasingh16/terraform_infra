name: Foundation CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/foundation/**"
      - "terraform/modules/network/**"
      - "terraform/modules/iam/**"
      - "terraform/modules/ecr/**"
      - ".github/workflows/terraform-foundation-ci.yml"

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_WORKING_DIR: terraform/foundation
  TF_PLAN_NAME: foundation

jobs:
  plan:
    name: Validate and plan foundation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Terraform providers and modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            ${{ env.TF_WORKING_DIR }}/.terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('terraform/foundation/**/*.tf', 'terraform/foundation/**/*.tfvars', 'terraform/foundation/**/*.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Configure Terraform plugin cache
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir="$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Terraform fmt check
        run: |
          terraform fmt -check -recursive terraform/foundation
          terraform fmt -check -recursive terraform/modules/network
          terraform fmt -check -recursive terraform/modules/iam
          terraform fmt -check -recursive terraform/modules/ecr

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-foundation-plan

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate -no-color

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -input=false -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-${{ env.TF_PLAN_NAME }}-plan
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan.txt
          retention-days: 14
          if-no-files-found: warn

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync(`${process.env.TF_WORKING_DIR}/plan.txt`, 'utf8');
            const maxLength = 45000;
            const body = [
              '## Terraform foundation plan',
              '',
              plan.length > maxLength
                ? `Plan is too large to show completely. Download the artifact \`terraform-${process.env.TF_PLAN_NAME}-plan\` for the full plan.\n\n\`\`\`terraform\n${plan.slice(0, maxLength)}\n...\n\`\`\``
                : `\`\`\`terraform\n${plan}\n\`\`\``
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
