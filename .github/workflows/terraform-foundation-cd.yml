name: Foundation CD

on:
  push:
    branches:
      - main
    paths:
      - "terraform/foundation/**"
      - "terraform/modules/network/**"
      - "terraform/modules/iam/**"
      - "terraform/modules/ecr/**"
      - ".github/workflows/terraform-foundation-cd.yml"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_WORKING_DIR: terraform/foundation
  TF_PLAN_NAME: foundation

jobs:
  apply:
    name: Deploy foundation
    runs-on: ubuntu-latest
    environment: terraform-foundation
    concurrency:
      group: terraform-foundation
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Terraform providers and modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            ${{ env.TF_WORKING_DIR }}/.terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('terraform/foundation/**/*.tf', 'terraform/foundation/**/*.tfvars', 'terraform/foundation/**/*.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Configure Terraform plugin cache
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir="$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Terraform fmt check
        run: |
          terraform fmt -check -recursive terraform/foundation
          terraform fmt -check -recursive terraform/modules/network
          terraform fmt -check -recursive terraform/modules/iam
          terraform fmt -check -recursive terraform/modules/ecr

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-foundation-apply

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate -no-color

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -input=false -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-${{ env.TF_PLAN_NAME }}-apply-plan
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan.txt
          retention-days: 14

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -lock-timeout=5m -auto-approve tfplan
